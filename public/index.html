<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your Chicken</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .widget {
    text-align: center;
    padding: 24px 20px 20px;
    max-width: 380px;
    width: 100%;
  }

  /* ── Connect Screen ── */
  .connect-screen {
    padding: 40px 20px;
  }
  .connect-screen .egg-icon {
    font-size: 48px;
    margin-bottom: 16px;
    animation: float 3s ease-in-out infinite;
  }
  .connect-screen h2 {
    font-size: 16px;
    font-weight: 600;
    color: #5D4E37;
    margin-bottom: 6px;
  }
  .connect-screen p {
    font-size: 13px;
    color: #8B7D6B;
    margin-bottom: 20px;
  }
  .connect-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 24px;
    background: #B2C9AD;
    color: #fff;
    border: none;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
  }
  .connect-btn:hover { background: #9BB896; transform: scale(1.03); }
  .connect-btn svg { width: 16px; height: 16px; }

  /* ── Chicken Display ── */
  .chicken-area {
    position: relative;
    width: 200px;
    height: 200px;
    margin: 0 auto 12px;
  }
  .chicken-area svg {
    width: 100%;
    height: 100%;
  }

  /* ── Progress Bar ── */
  .progress-wrap {
    margin: 0 auto 14px;
    max-width: 260px;
  }
  .progress-track {
    height: 10px;
    background: #F0EBE3;
    border-radius: 5px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    border-radius: 5px;
    background: linear-gradient(90deg, #B2C9AD, #E8B4C8);
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    right: -2px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px;
    height: 14px;
    background: #FFD54F;
    border-radius: 50%;
    border: 2px solid #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    display: none;
  }
  .progress-fill[style*="width: 0"]::after,
  .progress-fill[style*="width: 2%"]::after { display: none; }
  .progress-fill:not([style*="width: 0"]):not([style*="width: 2%"])::after { display: block; }

  .progress-text {
    font-size: 12px;
    color: #8B7D6B;
    margin-top: 6px;
  }
  .progress-text strong { color: #5D4E37; }

  /* ── Journey Bar ── */
  .journey-wrap {
    margin: 8px auto 14px;
    max-width: 260px;
  }
  .journey-track {
    height: 4px;
    background: #F0EBE3;
    border-radius: 2px;
    overflow: hidden;
  }
  .journey-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, #FFD54F, #FF9800);
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .journey-text {
    font-size: 10px;
    color: #B0A090;
    margin-top: 3px;
  }

  /* ── Level Badge ── */
  .level-badge {
    display: inline-block;
    padding: 4px 14px;
    background: #FFF8E1;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    color: #5D4E37;
    margin-bottom: 8px;
    border: 1px solid #F0EBE3;
  }

  .level-msg {
    font-size: 12px;
    color: #8B7D6B;
    max-width: 260px;
    margin: 0 auto;
    line-height: 1.4;
  }

  .error-msg {
    color: #D32F2F;
    font-size: 13px;
    margin-bottom: 16px;
  }

  .retry-btn {
    padding: 8px 20px;
    background: #F0EBE3;
    border: none;
    border-radius: 16px;
    font-size: 13px;
    color: #5D4E37;
    cursor: pointer;
    transition: background 0.2s;
  }
  .retry-btn:hover { background: #E8E0D4; }

  /* ── Celebration Screen ── */
  .celebration {
    text-align: center;
    padding: 30px 20px;
  }
  .celebration .big-trophy { font-size: 64px; margin-bottom: 12px; }
  .celebration h2 {
    font-size: 20px;
    font-weight: 700;
    color: #5D4E37;
    margin-bottom: 8px;
  }
  .celebration p {
    font-size: 14px;
    color: #8B7D6B;
    margin-bottom: 6px;
    line-height: 1.5;
  }
  .celebration .stats {
    font-size: 32px;
    font-weight: 700;
    color: #FF9800;
    margin: 12px 0;
  }

  /* ── Animations ── */
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  @keyframes wobble {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-3deg); }
    75% { transform: rotate(3deg); }
  }
  @keyframes crack {
    0%, 100% { transform: translateY(0) rotate(0); }
    20% { transform: translateY(-2px) rotate(-2deg); }
    40% { transform: translateY(0) rotate(2deg); }
    60% { transform: translateY(-3px) rotate(-1deg); }
    80% { transform: translateY(0) rotate(1deg); }
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  @keyframes strut {
    0%, 100% { transform: translateX(0) rotate(0); }
    25% { transform: translateX(-3px) rotate(-2deg); }
    75% { transform: translateX(3px) rotate(2deg); }
  }
  @keyframes proud {
    0%, 100% { transform: scale(1) translateY(0); }
    50% { transform: scale(1.03) translateY(-4px); }
  }
  @keyframes shimmer {
    0%, 100% { filter: brightness(1) saturate(1); }
    50% { filter: brightness(1.1) saturate(1.2); }
  }
  @keyframes sparkle-pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }
  @keyframes confetti-fall {
    0% { transform: translateY(0) rotate(0); opacity: 1; }
    100% { transform: translateY(400px) rotate(720deg); opacity: 0; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }
  @keyframes celebrate-bounce {
    0%, 100% { transform: translateY(0) scale(1); }
    30% { transform: translateY(-15px) scale(1.05); }
    50% { transform: translateY(-8px) scale(1.02); }
    70% { transform: translateY(-12px) scale(1.04); }
  }

  .anim-wobble svg { animation: wobble 2s ease-in-out infinite; }
  .anim-crack svg { animation: crack 1.5s ease-in-out infinite; }
  .anim-bounce svg { animation: bounce 2s ease-in-out infinite; }
  .anim-strut svg { animation: strut 2s ease-in-out infinite; }
  .anim-proud svg { animation: proud 3s ease-in-out infinite; }
  .anim-shimmer svg { animation: shimmer 3s ease-in-out infinite; }
  .anim-celebrate svg { animation: celebrate-bounce 2s ease-in-out infinite; }

  .sparkle { animation: sparkle-pulse 2s ease-in-out infinite; }
  .sparkle-d1 { animation-delay: 0.3s; }
  .sparkle-d2 { animation-delay: 0.6s; }
  .sparkle-d3 { animation-delay: 0.9s; }

  .confetti-piece {
    position: fixed;
    z-index: 999;
    animation: confetti-fall 2s ease-in forwards;
  }

  .level-up-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,253,247,0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 998;
    animation: fadeIn 0.3s ease;
    text-align: center;
    padding: 20px;
  }
  .level-up-overlay .big-emoji { font-size: 64px; margin-bottom: 12px; }
  .level-up-overlay h2 { font-size: 20px; color: #5D4E37; margin-bottom: 8px; }
  .level-up-overlay p { font-size: 14px; color: #8B7D6B; }
</style>
</head>
